scenarios:
  - id: daily_check
    summary: "日常 Git 检查流程：status → diff → diff --staged → log --graph"
    triggers:
      always: true
    sop: |
      Daily Git inspection flow:
      1. Run `git status -sb` to confirm branch, working tree, staging area, and upstream summary.
      2. Run `git diff` to inspect unstaged changes.
      3. Run `git diff --staged` to inspect what the next commit will really contain.
      4. Run `git log --oneline --graph -10` to place the current work in recent history.
      5. If a specific file is unexpectedly ignored, use `git check-ignore -v <existing-path>`.
    pitfalls: |
      - `git diff` does not show staged content; use `git diff --staged` for that.
      - `git check-ignore -v` should target a real path that exists in the repository or working tree.

  - id: detached_head
    summary: "Detached HEAD 恢复：检查未提交改动 → switch 回分支或 switch -c 保存"
    triggers:
      detached_head: true
    sop: |
      Detached HEAD recovery flow:
      1. Run `git status` to see whether there are uncommitted changes on the detached commit.
      2. If the user only wanted to inspect history, return with `git switch <existing-branch>`.
      3. If the current detached commit contains work that must be preserved, create a branch with `git switch -c <new-branch>`.
    pitfalls: |
      - Do not create a branch with a name that already exists.
      - New commits made on detached HEAD are easy to lose if no branch references them.
