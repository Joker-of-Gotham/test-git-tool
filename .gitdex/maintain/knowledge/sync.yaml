scenarios:
  - id: safe_sync_sop
    summary: "安全同步序列：fetch → 判断 ahead/behind → merge/rebase → push"
    triggers:
      has_upstream: true
    sop: |
      Safe sync sequence:
      1. `git fetch --prune` to refresh remote state without touching the working tree.
      2. `git log --left-right --count @{u}...HEAD` to judge ahead/behind/diverged state.
      3. Choose the integration strategy:
         - behind only -> `git merge --ff-only @{u}`
         - diverged -> `git merge @{u}` or `git rebase @{u}` depending on branch policy
         - ahead only and clean -> `git push`
      4. Push only after the branch state is understood.
    pitfalls: |
      - `git pull` hides fetch + integrate behind one command; inspect first when correctness matters.
      - If push is rejected, return to fetch -> inspect -> integrate instead of jumping to force-push.

  - id: diverged_integration
    summary: "分支分叉（ahead+behind 同时 >0）时的 merge/rebase 整合策略"
    triggers:
      ahead_gt: 0
      behind_gt: 0
    sop: |
      Diverged branch handling:
      1. `git fetch --prune`
      2. Choose the integration style:
         - merge -> preserve the real integration point
         - rebase -> keep a linear history, but only on branches that are safe to rewrite
      3. Resolve conflicts if they appear.
      4. Push after the branch is consistent again.
    pitfalls: |
      - Do not rebase public/shared branches casually.
      - Pushing immediately while diverged will be rejected.

  - id: first_push
    summary: "首次推送流程：确认远程 URL → git push -u origin HEAD → 建立追踪"
    triggers:
      has_upstream: false
      has_remote: true
      commit_count_gt: 0
    sop: |
      First push flow:
      1. Confirm the remote URL with `git remote -v`.
      2. Push with `git push -u origin HEAD` so the upstream tracking branch is created.
      3. After that, normal `git push` and `git pull --ff-only` flows become predictable.
    pitfalls: |
      - Prefer `HEAD` if branch naming is uncertain.
      - Verify the remote URL before the first push.

  - id: upstream_behind
    summary: "仅落后上游时的快进合并流程（ff-only 或先 stash 再 ff）"
    triggers:
      behind_gt: 0
      ahead: 0
    sop: |
      Behind-only fast-forward case:
      1. If the working tree is clean, use `git merge --ff-only @{u}`.
      2. If the tree is not clean, stash or commit first, then fast-forward.
    pitfalls: |
      - Fast-forward assumes the working tree is ready for integration.
