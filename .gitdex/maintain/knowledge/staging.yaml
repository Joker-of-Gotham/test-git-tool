scenarios:
  - id: partial_staging
    summary: "工作区和暂存区同时有改动时的精确提交流（add -p 逐块暂存）"
    triggers:
      working_count_gt: 0
      staged_count_gt: 0
    sop: |
      工作区和暂存区同时有改动时的精确提交流:
      1. git diff --staged — 确认暂存区内容
      2. git diff — 查看尚未暂存的改动
      3. 如需拆分: git add -p 逐块选择暂存
      4. git diff --staged — 再次确认提交边界
      5. git commit -m "<subject>"
    pitfalls:
      - git add 后继续修改文件，新改动不会自动进入暂存区
      - git commit -a 只处理已跟踪文件，不包含新文件

  - id: mixed_changes
    summary: "混合改动检查与拆分（git add -p 按 hunk 拆分，每次提交只做一件事）"
    triggers:
      working_count_gt: 3
    sop: |
      建议检查是否存在混合改动（功能代码 + 格式化 + 无关修改）:
      1. git diff 查看全部改动
      2. 使用 git add -p 按 hunk 拆分暂存
      3. 每次提交只做一件事，保证边界干净
      交互指令: y=暂存 n=跳过 s=拆分更细 e=手工编辑 q=退出
    pitfalls:
      - 一次提交混入多个不相关改动会导致 review/revert/cherry-pick 困难

  - id: commit_message_guidance
    summary: "Conventional Commits 规范：fix/feat/docs 前缀 + scope + 简洁标题"
    triggers:
      staged_count_gt: 0
    sop: |
      提交消息规范:
      标题: <verb>(<scope>): <what>
      动词: fix/feat/refactor/docs/test/chore/perf/style/build/ci
      正文: 只在需要时解释 why/trade-off/migration
      示例:
        fix(auth): prevent token refresh race condition
        feat(api): add pagination support for user list
        docs(readme): update installation instructions
    pitfalls:
      - 避免空泛标题如 update/fix bug/change code
      - 标题行保持短而完整，一行装不下说明提交边界不够干净

  - id: amend_fixup
    summary: "提交修正策略：amend 改最后一个提交、fixup+autosquash 改更早提交"
    triggers:
      commit_count_gt: 0
      staged_count_gt: 0
    sop: |
      发现刚提交有问题时的补救:
      最后一个提交: git commit --amend (或 --amend --no-edit)
      更早的提交: git commit --fixup=<commit>
      后续整理: git rebase -i --autosquash <base>
    pitfalls:
      - amend 会改写历史，已 push 的提交不要随意 amend
      - fixup 创建的是标记提交，需要后续 rebase --autosquash 才会合并
