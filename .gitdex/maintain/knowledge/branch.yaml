scenarios:
  - id: conflict_resolution
    summary: "合并冲突时的闭环处理流程（status → 解决 → add → continue/abort）"
    triggers:
      merge_in_progress: true
    sop: |
      合并冲突闭环处理:
      1. git status 列出冲突文件
      2. 逐文件处理冲突标记 <<<< ==== >>>>
      3. 确认解决后: git add <file>
      4. 全部解决后: git merge --continue
      5. 需要放弃: git merge --abort
    pitfalls:
      - 不要在冲突未解决时尝试 commit（除非所有冲突都已 add）
      - merge --abort 只在合并过程中有效

  - id: rebase_conflict_resolution
    summary: "变基冲突处理流程（continue/skip/abort 选择与注意事项）"
    triggers:
      rebase_in_progress: true
    sop: |
      变基冲突处理:
      1. git status 查看冲突文件
      2. 解决冲突并 git add <file>
      3. git rebase --continue 继续
      4. 需要跳过当前提交: git rebase --skip
      5. 完全放弃: git rebase --abort
    pitfalls:
      - rebase 期间不要用 git commit，用 git rebase --continue
      - skip 会丢弃当前提交的改动

  - id: merge_vs_rebase_decision
    summary: "merge vs rebase 决策规则：公共/私有分支、已推送/未推送的选择"
    triggers:
      has_upstream: true
      behind_gt: 0
      ahead_gt: 0
    sop: |
      merge vs rebase 决策:
      用 merge 当: 公共分支/需要保留合并记录/多人协作
      用 rebase 当: 个人分支/希望线性历史/还未推送
      判断规则:
        已推送到远端 → merge
        未推送的本地分支 → rebase
        团队有明确策略 → 按策略
    pitfalls:
      - 绝不 rebase 已经推送的公共分支
      - rebase 后需要 force push（只对私有分支安全）

  - id: cherry_pick_in_progress
    summary: "Cherry-pick 进行中的处理（continue/abort）与重复提交风险"
    triggers:
      cherry_in_progress: true
    sop: |
      Cherry-pick 进行中:
      1. 解决冲突并 git add
      2. git cherry-pick --continue
      3. 放弃: git cherry-pick --abort
    pitfalls:
      - cherry-pick 可能产生重复提交
      - 复杂多次 cherry-pick 建议改用 merge
