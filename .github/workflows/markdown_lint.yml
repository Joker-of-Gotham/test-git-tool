name: Markdown Lint
on:
  pull_request:
    paths: ['**/*.md']
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules
        continue-on-error: true
