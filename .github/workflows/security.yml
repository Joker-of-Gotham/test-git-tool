name: CodeQL
on:
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 0 * * 0'
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: github/codeql-action/init@v2
        with:
          languages: yaml
      - uses: github/codeql-action/analyze@v2
